<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-blue-600">KCPS HUB</a>
        
        <!-- Search Bar -->
        <div class="flex-1 max-w-md mx-8">
            <button onclick="openSearchModal()" class="w-full p-3 border-2 border-gray-300 rounded-lg bg-gray-50 hover:bg-gray-100 text-gray-600 text-left transition">
                🔍 Search content...
            </button>
        </div>
        
        <div class="flex gap-6 items-center">
            {% if user.is_authenticated %}
                <!-- Notification Bell -->
                <div class="relative group">
                    <button class="text-gray-600 hover:text-blue-600 text-2xl transition">
                        🔔
                    </button>
                    <div class="hidden group-hover:block absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-50 border border-gray-200">
                        <a href="{% url 'notification-preferences' %}" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b">
                            ⚙️ Notification Settings
                        </a>
                        <a href="{% url 'notification-history' %}" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">
                            📋 Notification History
                        </a>
                    </div>
                </div>

                <!-- User Menu -->
                <div class="relative group">
                    <button class="flex items-center gap-2 text-gray-600 hover:text-gray-900">
                        <span>{{ user.username }}</span>
                        <span>▼</span>
                    </button>
                    <div class="hidden group-hover:block absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-50 border border-gray-200">
                        <a href="{% url 'user-dashboard' %}" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b">
                            📊 Dashboard
                        </a>
                        <a href="{% url 'notification-preferences' %}" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b">
                            🔔 Notifications
                        </a>
                        {% if user.is_staff %}
                        <a href="{% url 'dashboard' %}" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b">
                            👨‍💼 Admin Panel
                        </a>
                        {% endif %}
                        <form method="post" action="{% url 'logout' %}" style="display:block;">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50">
                                🚪 Logout
                            </button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-900 font-semibold">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Search Modal -->
<div id="searchModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-start justify-center pt-20">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4">
        <!-- Search Input -->
        <div class="p-6 border-b">
            <div class="relative">
                <input type="text" id="searchInput" 
                       class="w-full p-4 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg"
                       placeholder="Search posts, videos, documents, images..."
                       onkeyup="performSearch(this.value)">
                <button onclick="closeSearchModal()" class="absolute right-4 top-4 text-gray-500 hover:text-gray-900 text-2xl">
                    ✕
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="searchResults" class="max-h-96 overflow-y-auto">
            <div class="p-6 text-center text-gray-500">
                Start typing to search...
            </div>
        </div>
    </div>
</div>

<script>
function openSearchModal() {
    const modal = document.getElementById('searchModal');
    if (modal) {
        modal.classList.remove('hidden');
        const input = document.getElementById('searchInput');
        if (input) input.focus();
    }
}

function closeSearchModal() {
    const modal = document.getElementById('searchModal');
    if (modal) modal.classList.add('hidden');
    const input = document.getElementById('searchInput');
    if (input) input.value = '';
    const results = document.getElementById('searchResults');
    if (results) results.innerHTML = '<div class="p-6 text-center text-gray-500">Start typing to search...</div>';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSearchModal();
});

const modal = document.getElementById('searchModal');
if (modal) {
    modal.addEventListener('click', function(e) {
        if (e.target === this) closeSearchModal();
    });
}

let searchTimeout;

function performSearch(query) {
    clearTimeout(searchTimeout);
    
    if (query.length < 2) {
        const results = document.getElementById('searchResults');
        if (results) results.innerHTML = '<div class="p-6 text-center text-gray-500">Start typing to search...</div>';
        return;
    }

    const results = document.getElementById('searchResults');
    if (results) results.innerHTML = '<div class="p-6 text-center text-gray-500">Searching...</div>';

    searchTimeout = setTimeout(() => {
        fetch('{% url "global-search" %}?q=' + encodeURIComponent(query))
            .then(response => response.json())
            .then(data => displaySearchResults(data))
            .catch(error => {
                console.error('Error:', error);
                const results = document.getElementById('searchResults');
                if (results) results.innerHTML = '<div class="p-6 text-center text-gray-500">Search error</div>';
            });
    }, 300);
}

function displaySearchResults(data) {
    const results = data.results;
    const resultsDiv = document.getElementById('searchResults');
    
    if (!resultsDiv) return;
    
    if (results.length === 0) {
        resultsDiv.innerHTML = '<div class="p-6 text-center text-gray-500">No results found</div>';
        return;
    }

    let html = '<div class="divide-y">';
    
    results.forEach(result => {
        const icon = result.type === 'video' ? '🎥' : 
                     result.type === 'post' ? '📝' : 
                     result.type === 'document' ? '📄' : '🖼️';
        
        const url = result.type === 'video' ? `/content/video/${result.id}/` :
                    result.type === 'post' ? `/content/post/${result.id}/` :
                    result.type === 'document' ? `/content/document/${result.id}/` :
                    `/content/image/${result.id}/`;
        
        html += `
            <a href="${url}" class="block p-4 hover:bg-gray-50 transition">
                <div class="flex items-start gap-4">
                    <span class="text-2xl">${icon}</span>
                    <div class="flex-1">
                        <p class="font-bold text-gray-900">${result.title}</p>
                        <p class="text-sm text-gray-600 mt-1">${result.description || ''}</p>
                        <div class="flex gap-3 mt-2">
                            <span class="text-xs font-semibold px-2 py-1 rounded-full
                                ${result.type === 'video' ? 'bg-green-100 text-green-800' :
                                  result.type === 'post' ? 'bg-orange-100 text-orange-800' :
                                  result.type === 'document' ? 'bg-purple-100 text-purple-800' :
                                  'bg-pink-100 text-pink-800'}">
                                ${result.type.charAt(0).toUpperCase() + result.type.slice(1)}
                            </span>
                            <span class="text-xs text-gray-500">${result.date}</span>
                        </div>
                    </div>
                </div>
            </a>
        `;
    });
    
    html += '</div>';
    resultsDiv.innerHTML = html;
}
</script>
