{% extends "base.html" %}

{% block title %}Create Post{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-gray-900 mb-8">✍️ Create New Post</h1>
        
        <form method="post" enctype="multipart/form-data" class="bg-white rounded-lg shadow p-8">
            {% csrf_token %}
            
            <!-- Title -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Testtt</label>
                {{ form.title }}
            </div>
            
            <!-- Category -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                {{ form.category }}
            </div>
            
            <!-- Quill Editor for Content -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Content</label>
                <!-- Quill will replace this textarea -->
                {{ form.content }}
            </div>

            <!-- Images Upload -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">📸 Attach Images (Optional)</label>
                <input type="file" name="post_images" accept="image/*" multiple class="w-full p-3 border-2 border-gray-300 rounded-lg">
                <p class="text-xs text-gray-500 mt-1">You can select multiple images</p>
            </div>

            <!-- Documents Upload -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">📄 Attach Documents (Optional)</label>
                <input type="file" name="post_documents" accept=".pdf,.doc,.docx" multiple class="w-full p-3 border-2 border-gray-300 rounded-lg">
                <p class="text-xs text-gray-500 mt-1">PDF, DOC, DOCX files only</p>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg">
                    📝 Publish
                </button>
                <a href="{% url 'user-dashboard' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-8 rounded-lg">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<!-- ✅ Quill Editor Setup -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>
    #id_content {
        display: none;
    }
    
    #quill-editor {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        min-height: 300px;
    }
    
    .ql-toolbar {
        border-top-left-radius: 0.5rem;
        border-top-right-radius: 0.5rem;
        border: 1px solid #d1d5db;
        background-color: #f9fafb;
    }
    
    .ql-container {
        border-bottom-left-radius: 0.5rem;
        border-bottom-right-radius: 0.5rem;
        border: none;
        font-size: 16px;
    }
    
    .ql-editor {
        min-height: 250px;
        padding: 15px;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const contentField = document.getElementById('id_content');
        
        if (!contentField) return;
        
        // Hide textarea
        contentField.style.display = 'none';
        
        // Create editor container
        const editorContainer = document.createElement('div');
        editorContainer.id = 'quill-editor';
        contentField.parentNode.insertBefore(editorContainer, contentField);
        
        // Initialize Quill
        const quill = new Quill('#quill-editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'header': 1 }, { 'header': 2 }, { 'header': 3 }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }],
                    [{ 'align': [] }],
                    ['link'],
                    ['clean']
                ]
            },
            placeholder: 'Write your post content here...'
        });
        
        // Load existing content
        if (contentField.value) {
            quill.root.innerHTML = contentField.value;
        }
        
        // Save on form submit
        document.querySelector('form').addEventListener('submit', function() {
            contentField.value = quill.root.innerHTML;
        });
    });
</script>

{{ form.media }}
{% endblock %}
