{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-8">Sign In</h1>
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" class="w-full p-3 border rounded mb-4" required>
            <input type="password" name="password" placeholder="Password" class="w-full p-3 border rounded mb-6" required>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
